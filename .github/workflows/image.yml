name: Release

# Build and publish the operator image — and on tag pushes, the helm chart —
# to GitHub Container Registry.
#
# - push to main           -> image tags: main, sha-<short>
# - push tag like v0.1.0   -> image tags: 0.1.0, 0.1, 0, latest
#                             chart published as oci://ghcr.io/.../charts/bigbang-operator:0.1.0
# - manual dispatch        -> image tags: main, sha-<short>

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: build & push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Computes tags and OCI labels from the ref. `latest` only floats on
      # semver tag pushes — bare main pushes don't promote it.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          # amd64-only for now — BB clusters are x86_64. Adding arm64 via
          # QEMU emulation pushes cold-build time past 25 min. Revisit with
          # a native ubuntu-24.04-arm matrix runner if arm64 is needed.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    # OCI chart versions are immutable, so only publish on tag pushes.
    # The tag's vX.Y.Z drives the chart version (strip the leading v).
    name: package & push chart
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Log in to GHCR (helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Sync CRD into chart
        run: ./hack/chart-sync.sh

      # Align chart appVersion + version with the git tag (vX.Y.Z → X.Y.Z).
      # Helm requires both fields to be valid semver, and the image tag is
      # pinned to the same value so install pulls a matching image.
      - name: Set chart version
        run: |
          version="${GITHUB_REF_NAME#v}"
          sed -i -E "s/^(version): .*/\1: $version/" chart/Chart.yaml
          sed -i -E "s/^(appVersion): .*/\1: \"$version\"/" chart/Chart.yaml
          sed -i -E "s/^(  tag): .*/\1: $version/" chart/values.yaml

      - name: Package & push
        run: |
          helm package chart -d dist
          helm push dist/bigbang-operator-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
