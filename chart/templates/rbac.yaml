apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "bigbang-operator.fullname" . }}
  labels:
    {{- include "bigbang-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["bigbang.dev"]
    resources: [packages]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["bigbang.dev"]
    resources: [packages/status]
    verbs: [get, update, patch]
  - apiGroups: ["bigbang.dev"]
    resources: [packages/finalizers]
    verbs: [update]
  - apiGroups: ["networking.k8s.io"]
    resources: [networkpolicies]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["security.istio.io"]
    resources: [peerauthentications, authorizationpolicies]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["networking.istio.io"]
    resources: [sidecars, serviceentries, virtualservices]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "bigbang-operator.fullname" . }}
  labels:
    {{- include "bigbang-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "bigbang-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "bigbang-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "bigbang-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bigbang-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "bigbang-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bigbang-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "bigbang-operator.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "bigbang-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
