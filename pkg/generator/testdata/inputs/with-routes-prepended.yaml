apiVersion: bigbang.dev/v1alpha1
kind: Package
metadata:
  name: myapp
  namespace: myapp
  uid: 11111111-1111-1111-1111-111111111111
spec:
  istio:
    enabled: true
    authorizationPolicies:
      enabled: true
      defaults: { enabled: false }
      generateFromNetpol: false
  networkPolicies:
    enabled: true
    defaults: { enabled: false }    # keep the noise down
    egress: { defaults: { enabled: false } }
    ingress: { defaults: { enabled: false } }
  routes:
    prependReleaseName: true        # the field under test
    inbound:
      api:
        enabled: true
        gateways: [istio-gateway/public-ingressgateway]
        hosts: [myapp.bigbang.mil]
        service: myapp
        port: 8080
        selector: { app.kubernetes.io/name: myapp }
    outbound:
      ext:
        enabled: true
        hosts: [api.example.com]
        ports:
          - { number: 443, name: https, protocol: TLS }
