apiVersion: bigbang.dev/v1alpha1
kind: Package
metadata:
  name: example-app
  namespace: example-app
  uid: 11111111-1111-1111-1111-111111111111
spec:
  istio:
    enabled: true
    authorizationPolicies:
      enabled: true
      defaults:
        enabled: false
      generateFromNetpol: false
  routes:
    inbound:
      example-app:
        enabled: true
        gateways:
          - istio-gateway/public-ingressgateway
          - istio-gateway/passthrough-ingressgateway
        hosts:
          - example-app.bigbang.mil
        service: example-app.example-app.svc.cluster.local
        port: 8080
        selector:
          app.kubernetes.io/name: example-app
