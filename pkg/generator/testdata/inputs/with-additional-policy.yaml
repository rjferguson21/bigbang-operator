apiVersion: bigbang.dev/v1alpha1
kind: Package
metadata:
  name: example-app
  namespace: example-app
  uid: 11111111-1111-1111-1111-111111111111
spec:
  istio:
    enabled: true
    mtls:
      mode: PERMISSIVE
  networkPolicies:
    enabled: true
    additionalPolicies:
      - name: allow-egress-to-external-api
        labels:
          purpose: external-egress
        spec:
          podSelector:
            matchLabels:
              app.kubernetes.io/name: example-app
          policyTypes:
            - Egress
          egress:
            - to:
                - ipBlock:
                    cidr: 0.0.0.0/0
                    except:
                      - 10.0.0.0/8
              ports:
                - protocol: TCP
                  port: 443
