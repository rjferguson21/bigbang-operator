apiVersion: bigbang.dev/v1alpha1
kind: Package
metadata:
  name: example-app
  namespace: example-app
  uid: 11111111-1111-1111-1111-111111111111
spec:
  istio:
    enabled: true
  networkPolicies:
    enabled: true
    egress:
      from:
        example-app:
          to:
            k8s:
              data/postgres:5432: true
              data/redis:[6379,6380]: true
        "*":
          to:
            k8s:
              udp://kube-system/kube-dns:53: true
    ingress:
      to:
        # Local key carries the port (and optional protocol). The remote
        # key is just `[<identity>@]<ns>[/<pod>]` — no port, no protocol.
        example-app:8080:
          from:
            k8s:
              istio-gateway/public-ingressgateway: true
        example-app:15020:
          from:
            k8s:
              monitoring/prometheus: true
