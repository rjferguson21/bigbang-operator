apiVersion: bigbang.dev/v1alpha1
kind: Package
metadata:
  name: example-app
  namespace: example-app
  uid: 11111111-1111-1111-1111-111111111111
spec:
  istio:
    enabled: true
    authorizationPolicies:
      enabled: true
      defaults: { enabled: false }
      generateFromNetpol: true
  networkPolicies:
    enabled: true
    defaults: { enabled: false }
    ingress:
      defaults: { enabled: false }
      to:
        example-app:8080:
          from:
            cidr:
              10.0.0.0/8: true
              0.0.0.0/0: true
