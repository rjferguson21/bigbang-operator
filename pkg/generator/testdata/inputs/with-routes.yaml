apiVersion: bigbang.dev/v1alpha1
kind: Package
metadata:
  name: example-app
  namespace: example-app
  uid: 11111111-1111-1111-1111-111111111111
spec:
  istio:
    enabled: true
  networkPolicies:
    enabled: true
  routes:
    inbound:
      example-app:
        enabled: true
        gateways:
          - istio-gateway/public-ingressgateway
        hosts:
          - example-app.bigbang.mil
        service: example-app
        port: 8080
        selector:
          app.kubernetes.io/name: example-app
    outbound:
      external-api:
        enabled: true
        hosts:
          - api.example.com
        ports:
          - number: 443
            name: https
            protocol: TLS
