apiVersion: bigbang.dev/v1alpha1
kind: Package
metadata:
  name: example-app
  namespace: example-app
  uid: 11111111-1111-1111-1111-111111111111
spec:
  networkPolicies:
    enabled: true
    egress:
      defaults: { enabled: false }
      excludeCIDRs:
        - 10.10.10.0/24      # contained in 10.0.0.0/8 -> exclude
        - 192.168.0.0/16     # NOT contained in 10.0.0.0/8 -> skip
        - 169.254.169.254/32 # not in 10.0.0.0/8 -> skip
      from:
        example-app:
          to:
            cidr:
              10.0.0.0/8: true
              0.0.0.0/0: true
