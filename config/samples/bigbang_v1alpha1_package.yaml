---
apiVersion: v1
kind: Namespace
metadata:
  name: example-app
---
# Defaults-only sample: turning on `istio.enabled` and
# `networkPolicies.enabled` produces 1 PeerAuthentication + 7 default
# NetworkPolicies in the example-app namespace.
apiVersion: bigbang.dev/v1alpha1
kind: Package
metadata:
  name: example-app
  namespace: example-app
spec:
  istio:
    enabled: true
    mtls:
      mode: STRICT
  networkPolicies:
    enabled: true
